<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Asteroids (1979)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #000;
      touch-action: none;
    }
    .touch-btn {
      position: fixed;
      z-index: 10;
      border: 1px solid rgba(215, 247, 255, 0.55);
      border-radius: 50%;
      color: rgba(215, 247, 255, 0.85);
      background: rgba(215, 247, 255, 0.06);
      font-family: "Courier New", monospace;
      font-weight: bold;
      text-align: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .touch-btn.active {
      background: rgba(215, 247, 255, 0.22);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
